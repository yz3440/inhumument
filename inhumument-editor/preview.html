<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>preview</title>
    <style>
      :root {
        --bg: oklch(0.978 0.004 260);
        --ink: oklch(0.14 0.008 260);
        --muted: oklch(0.44 0.012 260);
        --border: oklch(0.14 0 0 / 0.09);
        --accent: oklch(0.52 0.16 265);
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--ink);
      }
      body {
        overflow: auto;
      }
      #stage {
        min-width: 100%;
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
        box-sizing: border-box;
      }
      canvas {
        display: block;
        background: #fff;
        box-shadow:
          0 1px 0 0 oklch(0 0 0 / 0.05),
          0 10px 28px -14px oklch(0 0 0 / 0.14);
        max-width: none !important;
        max-height: none !important;
      }
      #status {
        position: fixed;
        bottom: 10px;
        left: 10px;
        font: 11px "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
        font-variant-numeric: tabular-nums;
        color: var(--muted);
        background: oklch(0.995 0.002 260);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 3px 8px;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="stage"></div>
    <div id="status">awaiting sketch…</div>
    <script type="module" src="/src/preview-runtime.ts"></script>
  </body>
</html>
